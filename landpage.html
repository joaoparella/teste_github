<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Exemplo - Pagina responsiva</title>
</head>
<body>
<section class="hero-launch">
  <article class="hero-content">
    <h1>O Futuro do Código Limpo Chegou</h1>
    <p>Aprenda a escrever HTML que máquinas entendem e humanos admiram.</p>

    <form action="/subscribe" method="POST">
      <label for="user-email">Receba o guia exclusivo:</label>
      <input type="email" id="user-email" name="email" placeholder="seu@email.com" required>
      <button type="submit">Quero meu guia</button>
    </form>
  </article>

  <figure class="hero-image">
    <img src="https://blog.betrybe.com/wp-content/uploads/2021/02/piqsels-6-1920x1024.jpg" 
         alt="Notebook exibindo um editor de código com indentação perfeita"  width="400">
    <figcaption>Interface do novo framework CleanCode.js</figcaption>
  </figure>
</section> 
</body>
</html>
