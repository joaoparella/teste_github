
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Site Exemplo</title>
</head>
<body>
    <article class="product-card">
    <figure class="product-image">
        <img src="https://reiko.com/cdn/shop/files/HSBT01-UNINV-1.jpg?v=1744304429&width=1206" 
            alt="Fone de ouvido Bluetooth preto com acabamento acolchoado" width="200">
        <figcaption>Lançamento 2026</figcaption>
    </figure>

    <header class="product-info">
        <span class="category">Eletrônicos</span>
        <h2>Fone de Ouvido Bluetooth</h2>
    </header>

    <p class="price" aria-label="Preço: 299 reais">
        <small>R$</small> 299,00
    </p>

    <footer>
        <button type="button" class="btn-buy" aria-label="Comprar Fone de Ouvido Bluetooth">
        Adicionar ao Carrinho
        </button>
    </footer>
    </article>
</body>
</html>
